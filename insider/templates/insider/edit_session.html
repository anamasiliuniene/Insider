{% extends "insider/base.html" %}
{% load static %}

{% block title %}Edit Session{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">

        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Edit Session for {{ session.worker.username }}</h6>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="check_in" class="form-label">Check In</label>
                        <input type="datetime-local" class="form-control" id="check_in" name="check_in"
                               value="{{ session.check_in|date:'Y-m-d\\TH:i' }}">
                    </div>

                    <div class="mb-3">
                        <label for="check_out" class="form-label">Check Out</label>
                        <input type="datetime-local" class="form-control" id="check_out" name="check_out"
                               value="{% if session.check_out %}{{ session.check_out|date:'Y-m-d\\TH:i' }}{% endif %}">
                    </div>

                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{% url 'sessions' %}" class="btn btn-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- Optional: you can include JS for datepicker enhancements if needed -->
<script>
    // Optional: make sure browsers without native support handle datetime-local
    document.addEventListener("DOMContentLoaded", function () {
        // Example: custom validation or enhancements
    });
</script>
{% endblock %}
